name: Build and Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:

  build-linux-x86_64:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: false

      - name: Init RandomX submodule
        run: git submodule update --init --recursive -- src/crypto/randomx

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential cmake git \
            libboost-all-dev libssl-dev libevent-dev libsqlite3-dev

      - name: Build
        run: |
          cmake -B build -DBUILD_TESTING=OFF -DENABLE_IPC=OFF -DWITH_ZMQ=OFF -DENABLE_WALLET=ON
          cmake --build build -j$(nproc)

      - name: Package
        run: |
          VERSION="${{ github.ref_name }}"
          mkdir -p release
          cp build/bin/botcoind build/bin/botcoin-cli release/
          strip release/botcoind release/botcoin-cli
          tar -czvf "botcoin-${VERSION}-linux-x86_64.tar.gz" -C release .

      - uses: actions/upload-artifact@v4
        with:
          name: linux-x86_64
          path: botcoin-*-linux-x86_64.tar.gz


  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: false

      - name: Init RandomX submodule
        run: git submodule update --init --recursive -- src/crypto/randomx

      - name: Setup MSVC
        uses: ilammy/msvc-dev-cmd@v1

      - name: Clone vcpkg
        run: |
          git clone https://github.com/microsoft/vcpkg
          .\vcpkg\bootstrap-vcpkg.bat

      - name: Install dependencies
        run: |
          .\vcpkg\vcpkg install boost:x64-windows
          .\vcpkg\vcpkg install openssl:x64-windows
          .\vcpkg\vcpkg install libevent:x64-windows
          .\vcpkg\vcpkg install sqlite3:x64-windows
          .\vcpkg\vcpkg install zlib:x64-windows

      - name: Configure
        run: >
          cmake -S . -B build
          -A x64
          -DCMAKE_TOOLCHAIN_FILE=./vcpkg/scripts/buildsystems/vcpkg.cmake
          -DENABLE_WALLET=ON
          -DBUILD_TESTING=OFF
          -DENABLE_IPC=OFF
          -DWITH_ZMQ=OFF
          -DCMAKE_BUILD_TYPE=Release

      - name: Build
        run: cmake --build build --config Release --parallel

      - name: Package (.zip)
        run: |
          $VERSION = "${{ github.ref_name }}"
          New-Item -ItemType Directory -Path release
          Copy-Item build\bin\Release\botcoind.exe release\
          Copy-Item build\bin\Release\botcoin-cli.exe release\
          Compress-Archive -Path release\* -DestinationPath "botcoin-$VERSION-windows-x86_64.zip"

      - uses: actions/upload-artifact@v4
        with:
          name: windows-x86_64
          path: botcoin-*-windows-x86_64.zip


  release:
    needs: [build-linux-x86_64, build-windows]
    runs-on: ubuntu-22.04
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Collect artifacts
        run: |
          mkdir dist
          find artifacts -type f -exec mv {} dist/ \;

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: ${{ github.ref_name }}
          files: dist/*
          body: |
            ## Botcoin ${{ github.ref_name }}

            ### Downloads
            | Platform | File |
            |----------|------|
            | Linux x86_64 | `botcoin-${{ github.ref_name }}-linux-x86_64.tar.gz` |
            | Windows x86_64 | `botcoin-${{ github.ref_name }}-windows-x86_64.zip` |
